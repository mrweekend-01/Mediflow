services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mediflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sistemas123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mediflow_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:Sistemas123@db:5432/mediflow_db
      SECRET_KEY: mediflow_clave_super_secreta_2025
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      APP_NAME: MediFlow
      APP_VERSION: 1.0.0
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
